<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Notion</title>
    <link rel="stylesheet" href="notion.css">
</head>
<body>
<div class="container">
    <div class="header">
        <div class="left">
            <div><img src="images/Notion-Logo.png"></div>
            <div class="feature">
                <div class="fea">Features</div>
                <div class="fea">Testinomials</div>
                <div class="fea">Developers</div>
                <div class="fea">It's Free</div>
            </div>
        </div>
        <div class="right">
<button class="btn-primary"><img src="images/chrome.png">Add to Chrome</button>
<button class="btn-secondary"><img src="images/apple.png">Download for Mac</button>
        </div>

    </div>
    <div class="main">
        <div class="main-content">

            <p >Welcome to nbundle</p>
            <div class="heading"><h1>Your</h1><h1 style="color: royalblue">Notion</h1><h1>App Store</h1> </div>
            <p>Bring functionalities of other apps into your notion workspaces.</p>

        </div>

        <div class="buttonarea">
            <button class="btn-primary1"><img src="images/chrome.png">Add to Chrome</button>
            <button class="btn-secondary1"><img src="images/apple.png">Download for Mac</button>
        </div>
    </div>

    <div class="footer">
        <div class="footer-txt">
            <p>All apps live and work where you use Notion.</p>
        </div>
        <div class="footer-items">
            <div class="item">
                <div class="icon"><img src="images/chrome.png"></div>
                <h2> Chrome</h2>
            </div>

            <div class="item">
                <div class="icon"><img src="images/Edge.png" ></div>
                <h2> Edge</h2>
            </div>
            <div class="item">
                <div class="icon3"><img src="images/brave.png"></div>
                <h2>Brave</h2>
            </div>
            <div class="item">
                <div class="icon"><img src="images/firefox.png" ></div>
                <h2> Firefox</h2>
            </div>
            <div class="item">
                <div class="icon"><img src="images/apple.png" ></div>
                <h2> Mac</h2>
            </div>
            <div class="item">
                <div class="icon6"><img src="images/windows.png" ></div>
                <h2> Windows</h2>
            </div>
        </div>
    </div>
</div>

</body>
</html>
